name: 🎬 DalilENT Reel Renderer

on:
  schedule:
    # Run every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub UI
    inputs:
      force_run:
        description: 'Force run even if no jobs'
        required: false
        default: 'false'

jobs:
  render-reels:
    name: Render Pending Reels
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🎞️ Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Python Dependencies
        run: pip install requests Pillow

      - name: 🤖 Fetch & Render Jobs
        env:
          WP_SITE_URL:   ${{ secrets.WP_SITE_URL }}
          WP_DME_TOKEN:  ${{ secrets.WP_DME_TOKEN }}
        run: python render_reels.py

      - name: 📊 Upload Render Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: render-logs-${{ github.run_number }}
          path: render_logs/
          retention-days: 7
